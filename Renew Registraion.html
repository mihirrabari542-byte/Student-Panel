<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .no-record {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #c0392b;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 40px;
        }

        .no-record i {
            font-size: 20px;
        }


        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
    </style>
</head>

<body>
    <div class="no-record">
        <i class="fas fa-exclamation-circle"></i>
        - You are not eligible to register / renew your hostel registration as you are in your final semester. If you
        still wish to proceed, kindly contact the Hostel Department for assistance.
    </div>


</body>

</html>
